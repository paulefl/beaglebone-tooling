name: Test Report & GitHub Pages
description: >
  Full test report pipeline: setup Go + Python, load trend cache, generate
  test report, update trend via trend_summary.py, persist trend to
  reports-branch, generate dashboard via generate_reports.py, upload reports
  artifact, and deploy to GitHub Pages (main branch only).
  Requires actions/checkout and download-tooling to have run beforehand.
  Job must declare: permissions: contents: write, pages: write, id-token: write

inputs:
  go-version:
    description: Go version for make test-report.
    required: false
    default: '1.23'

  python-version:
    description: Python version.
    required: false
    default: '3.12'

  requirements-dev:
    description: Path to requirements-dev.txt.
    required: false
    default: tests/requirements-dev.txt

  cli-artifact:
    description: Name of the CLI binary artifact to download.
    required: false
    default: bbcli-linux-amd64

  cli-bin-path:
    description: Path where the CLI binary is placed.
    required: false
    default: bin/bbcli-linux-amd64

  retention-days:
    description: Report artifact retention in days.
    required: false
    default: '30'

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Python deps
      shell: bash
      run: pip install -r ${{ inputs.requirements-dev }} reportlab

    # ── Trend: Vorherige Daten aus Cache laden ──────────────────────────────
    - name: Trend-Cache laden
      uses: actions/cache/restore@v4
      with:
        path: reports/test_trend.json
        key:          test-trend-${{ github.run_number }}
        restore-keys: test-trend-

    - name: Trend aus reports-Branch laden (Cache-Fallback)
      shell: bash
      run: |
        mkdir -p reports
        if [ ! -f reports/test_trend.json ]; then
          git fetch origin refs/heads/reports 2>/dev/null || true
          git show origin/reports:test_trend.json > reports/test_trend.json 2>/dev/null \
            || echo '[]' > reports/test_trend.json
          ENTRIES=$(python3 -c "import json; print(len(json.load(open('reports/test_trend.json'))))" 2>/dev/null || echo "0")
          echo "ℹ️  Cache-Miss: ${ENTRIES} Einträge aus reports-Branch geladen"
        else
          ENTRIES=$(python3 -c "import json; print(len(json.load(open('reports/test_trend.json'))))" 2>/dev/null || echo "?")
          echo "✅ ${ENTRIES} Einträge aus Cache geladen"
        fi

    - name: CLI Binary laden
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.cli-artifact }}
        path: bin/

    - name: CLI Binary ausführbar machen
      shell: bash
      run: chmod +x ${{ inputs.cli-bin-path }}

    - name: Test Report generieren
      shell: bash
      run: make test-report
      continue-on-error: true

    # ── Trend: Aktuellen Build eintragen ───────────────────────────────────
    - name: Trend aktualisieren
      shell: bash
      run: |
        python3 << 'EOF'
        import json, os
        from datetime import datetime, timezone

        total = passed = failed = 0

        # Go Tests (JSON-Lines Format)
        if os.path.exists("reports/go-tests.json"):
            for line in open("reports/go-tests.json"):
                try:
                    e = json.loads(line)
                    if e.get("Test"):
                        if   e.get("Action") == "pass": passed += 1; total += 1
                        elif e.get("Action") == "fail": failed += 1; total += 1
                except Exception:
                    pass

        # Python Tests (pytest-json-report Format)
        for f in ["reports/pytest-api.json", "reports/pytest-cli.json",
                  "reports/pytest-hardware.json"]:
            if os.path.exists(f):
                try:
                    s  = json.load(open(f)).get("summary", {})
                    p  = s.get("passed", 0)
                    fl = s.get("failed", 0) + s.get("error", 0)
                    passed += p; failed += fl; total += p + fl
                except Exception:
                    pass

        # Go Coverage aus coverage.out
        avg_cov = 0.0
        if os.path.exists("reports/go-coverage.out"):
            covs = []
            for line in open("reports/go-coverage.out"):
                if line.startswith("mode:") or not line.strip():
                    continue
                try:
                    covs.append(float(line.split()[2]))
                except Exception:
                    pass
            avg_cov = round(sum(covs) / len(covs), 1) if covs else 0.0

        entry = {
            "timestamp":      datetime.now(timezone.utc).isoformat(),
            "build":          os.environ.get("GITHUB_RUN_NUMBER", "0"),
            "branch":         os.environ.get("GITHUB_REF_NAME",   "main"),
            "commit":         os.environ.get("GITHUB_SHA", "")[:8],
            "total_tests":    total,
            "bestanden":      passed,
            "fehlgeschlagen": failed,
            "erfolgsrate":    round(passed / total * 100, 1) if total else 0.0,
            "avg_coverage":   avg_cov,
        }

        trend_file = "reports/test_trend.json"
        trend = json.load(open(trend_file)) if os.path.exists(trend_file) else []
        trend.append(entry)
        trend = trend[-100:]
        os.makedirs("reports", exist_ok=True)
        json.dump(trend, open(trend_file, "w"), indent=2)

        print(f"✅ Run #{entry['build']} | "
              f"Tests: {passed}/{total} ({entry['erfolgsrate']}%) | "
              f"Coverage: {avg_cov}%  [{len(trend)} Trend-Einträge]")
        EOF

    - name: Trend Summary schreiben
      if: always()
      shell: bash
      run: python3 tooling/trend_summary.py

    # ── Trend-Cache speichern ───────────────────────────────────────────────
    - name: Trend-Cache speichern
      uses: actions/cache/save@v4
      if: always()
      with:
        path: reports/test_trend.json
        key:  test-trend-${{ github.run_number }}

    # ── Trend dauerhaft in reports-Branch persistieren ──────────────────────
    - name: Trend in reports-Branch persistieren
      if: always() && github.ref == 'refs/heads/main'
      shell: bash
      env:
        GH_TOKEN: ${{ env.GH_TOKEN || env.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        TMPDIR=$(mktemp -d)
        if git ls-remote --exit-code origin refs/heads/reports 2>/dev/null; then
          git worktree add "$TMPDIR" origin/reports
        else
          git worktree add --orphan -b reports "$TMPDIR"
          git -C "$TMPDIR" commit --allow-empty -m "ci: initialer reports-Branch [skip ci]"
          git -C "$TMPDIR" push origin HEAD:refs/heads/reports
        fi
        cp reports/test_trend.json "$TMPDIR/test_trend.json"
        git -C "$TMPDIR" add test_trend.json
        if git -C "$TMPDIR" diff --cached --quiet; then
          echo "ℹ️  Keine Trend-Änderungen"
        else
          git -C "$TMPDIR" commit -m "ci: Trend-Update Build #${{ github.run_number }} [skip ci]"
          git -C "$TMPDIR" push origin HEAD:refs/heads/reports
          echo "✅ Trend in reports-Branch gespeichert"
        fi
        git worktree remove "$TMPDIR" --force

    # ── Dashboard generieren ────────────────────────────────────────────────
    - name: Dashboard mit Trend generieren
      if: always()
      shell: bash
      run: |
        if [ -f reports/requirements.json ]; then
          python3 tooling/generate_reports.py \
            --requirements reports/requirements.json \
            --results      reports/test_results.json \
            --output       reports \
            --trend        reports/test_trend.json
          echo "✅ Dashboard mit Trend generiert"
        else
          echo "ℹ️  Kein requirements.json → Trend-Datei wird als Artefakt hochgeladen"
        fi
        if [ -f reports/bb_dashboard.html ]; then
          cp reports/bb_dashboard.html reports/index.html
        fi

    # ── Artefakte hochladen ─────────────────────────────────────────────────
    - name: Upload Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports-${{ github.run_number }}
        path: |
          reports/*.json
          reports/*.html
          reports/*.out
          reports/shell-syntax.txt
        retention-days: ${{ inputs.retention-days }}

    # ── GitHub Pages Deploy (nur main) ──────────────────────────────────────
    - name: StrictDoc HTML laden
      if: github.ref == 'refs/heads/main'
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: strictdoc-html
        path: reports/strictdoc/

    - name: StrictDoc PDF laden
      if: github.ref == 'refs/heads/main'
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: strictdoc-pdf
        path: reports/strictdoc/pdf/

    - name: StrictDoc Excel laden
      if: github.ref == 'refs/heads/main'
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: strictdoc-excel
        path: reports/strictdoc/excel/

    - name: StrictDoc ReqIF laden
      if: github.ref == 'refs/heads/main'
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: strictdoc-reqif
        path: reports/strictdoc/reqif-sdoc/

    - name: CHANGELOG für Pages bereitstellen
      if: github.ref == 'refs/heads/main'
      shell: bash
      run: cp CHANGELOG.md reports/CHANGELOG.md

    - name: GitHub Pages vorbereiten
      if: github.ref == 'refs/heads/main'
      uses: actions/configure-pages@v5

    - name: Reports für Pages hochladen
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: reports/

    - name: Deploy zu GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: actions/deploy-pages@v4

    - name: Pages Smoke-Test
      if: github.ref == 'refs/heads/main'
      shell: bash
      run: |
        URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        for i in $(seq 1 12); do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "Versuch $i: HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ GitHub Pages erreichbar" && exit 0
          sleep 15
        done
        echo "❌ GitHub Pages nicht erreichbar nach 3 Minuten"
        exit 1
