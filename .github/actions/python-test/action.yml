name: Python Test Pipeline
description: >
  Full Python test pipeline: setup Python, install dependencies,
  run pytest with JUnit XML + coverage reports, optionally convert
  JUnit → SARIF and upload to GitHub Code Scanning, upload artifact.
  Requires actions/checkout to have run in the calling job.
  Job must declare security-events: write when upload-sarif is true.

inputs:
  python-version:
    description: Python version.
    required: false
    default: '3.12'

  requirements-dev:
    description: Path to requirements-dev.txt.
    required: false
    default: tests/requirements-dev.txt

  test-path:
    description: Path to pytest test directory.
    required: false
    default: tests/api/

  junit-xml:
    description: Path for JUnit XML output.
    required: false
    default: reports/pytest-junit.xml

  coverage-xml:
    description: Path for coverage XML output.
    required: false
    default: reports/python-coverage.xml

  coverage-src:
    description: Source path for --cov flag.
    required: false
    default: tests/api

  artifact-name:
    description: Name of the uploaded reports artifact (empty = no upload).
    required: false
    default: python-reports

  retention-days:
    description: Artifact retention in days.
    required: false
    default: '30'

  upload-sarif:
    description: Convert JUnit XML → SARIF and upload to GitHub Code Scanning ('true'/'false'). Requires security-events:write in the calling job.
    required: false
    default: 'true'

  sarif-category:
    description: Category label for the SARIF upload.
    required: false
    default: python-tests

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ inputs.requirements-dev }} pytest-cov

    - name: Run Tests
      shell: bash
      run: |
        mkdir -p reports
        pytest ${{ inputs.test-path }} -v --timeout=10 \
          --junitxml=${{ inputs.junit-xml }} \
          --cov=${{ inputs.coverage-src }} \
          --cov-report=xml:${{ inputs.coverage-xml }} \
          --cov-report=term

    - name: Convert Python JUnit → SARIF
      if: inputs.upload-sarif == 'true'
      shell: bash
      run: |
        pip install junit2sarif --quiet
        junit2sarif ${{ inputs.junit-xml }} -o reports/python-tests.sarif

    - name: Upload Python Test SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true'
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: reports/python-tests.sarif
        category: ${{ inputs.sarif-category }}

    - name: Upload Python reports
      if: inputs.artifact-name != ''
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.junit-xml }}
          ${{ inputs.coverage-xml }}
        retention-days: ${{ inputs.retention-days }}
