name: Download beaglebone-tooling
description: >
  Downloads the beaglebone-tooling release tarball and extracts it into the
  tooling/ directory. Requires GH_TOKEN / GITHUB_TOKEN in the calling job.

inputs:
  version:
    description: >
      Release tag to download (e.g. "v1.1.0").
      Leave empty to download the latest release.
    required: false
    default: ''

  dest:
    description: Target directory for the extracted tooling files.
    required: false
    default: tooling

runs:
  using: composite
  steps:
    - name: Download & extract tooling
      shell: bash
      env:
        GH_TOKEN: ${{ env.GH_TOKEN || env.GITHUB_TOKEN }}
      run: |
        mkdir -p "${{ inputs.dest }}"
        # Retry loop — guards against race condition where the release tarball
        # is not yet uploaded when this step runs (CI uploads ~20s after tag).
        for attempt in 1 2 3 4 5; do
          rm -rf /tmp/tooling-dl && mkdir -p /tmp/tooling-dl
          if [ -n "${{ inputs.version }}" ]; then
            gh release download "${{ inputs.version }}" \
              --repo paulefl/beaglebone-tooling \
              --pattern "tooling-*.tar.gz" \
              --dir /tmp/tooling-dl && break
          else
            gh release download \
              --repo paulefl/beaglebone-tooling \
              --pattern "tooling-*.tar.gz" \
              --dir /tmp/tooling-dl && break
          fi
          echo "⏳ Attempt ${attempt}/5 failed — waiting 15s for tarball upload..."
          sleep 15
        done
        tar xf /tmp/tooling-dl/tooling-*.tar.gz -C "${{ inputs.dest }}"
        chmod +x "${{ inputs.dest }}"/*.sh "${{ inputs.dest }}"/bausteinsicht
