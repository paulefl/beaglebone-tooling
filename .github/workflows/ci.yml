name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest pytest-json-report
      - name: Run tests
        run: pytest tests/ -v --tb=short

  shellcheck:
    name: Shell Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: |
          shellcheck report.sh build_adoc.sh bausteinsicht-container.sh bausteinsicht.sh \
            || true  # Warnings are non-blocking

  release:
    name: Create Release Archive
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Build tooling archive
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          ARCHIVE="tooling-${VERSION}.tar.gz"
          tar czf "$ARCHIVE" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            .
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "$ARCHIVE"
